name: Android CI

on:
  push:
    branches: [ master, 'claude/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests and coverage
        run: ./gradlew jacocoTestReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: app/build/reports/jacoco/jacocoTestReport/

  # Build signed APK + AAB on version tags (v*), gated on the build + unit tests.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, unit-tests ]
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create/attach the GitHub Release on tags

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Require signing secret
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set — refusing to build a release without the keystore."
            exit 1
          fi

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # PKCS12 uses one password for both the store and the key entry.
          {
            echo "storeFile=$RUNNER_TEMP/upload-keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$STORE_PASSWORD"
          } > key.properties

      - name: Set release artifact version
        run: echo "RELEASE_VERSION=$GITHUB_REF_NAME" >> "$GITHUB_ENV"

      - name: Build signed APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Verify APK is release-signed
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Stage release APK and AAB
        run: |
          mkdir -p "$RUNNER_TEMP/release-artifacts"
          cp app/build/outputs/apk/release/app-release.apk \
            "$RUNNER_TEMP/release-artifacts/Rot13-$RELEASE_VERSION.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
            "$RUNNER_TEMP/release-artifacts/Rot13-$RELEASE_VERSION.aab"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rot13-release-android
          path: |
            ${{ runner.temp }}/release-artifacts/Rot13-${{ env.RELEASE_VERSION }}.apk
            ${{ runner.temp }}/release-artifacts/Rot13-${{ env.RELEASE_VERSION }}.aab

      - name: Detect release type
        id: release_metadata
        run: |
          if [[ "$GITHUB_REF_NAME" =~ [[:alpha:]]$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<RELEASE_BODY"
              echo "> [!WARNING]"
              echo "> Test version, not a stable release"
              echo "RELEASE_BODY"
            } >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_metadata.outputs.prerelease }}
          append_body: true
          body: ${{ steps.release_metadata.outputs.body }}
          files: |
            ${{ runner.temp }}/release-artifacts/Rot13-${{ env.RELEASE_VERSION }}.apk
            ${{ runner.temp }}/release-artifacts/Rot13-${{ env.RELEASE_VERSION }}.aab

      - name: Clean up secrets
        if: always()
        run: rm -f key.properties "$RUNNER_TEMP/upload-keystore.jks"
